<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body{display:none;}
  html.auth-ok body, html.auth-denied body{display:block;}
</style>
<script>
(function(){
  const password = prompt("クラスコードを入力してください");
  if(password === "hokuto2026"){
    window.__authOK = true;
    document.documentElement.classList.add("auth-ok");
  }else{
    window.__authOK = false;
    document.documentElement.classList.add("auth-denied");
    document.addEventListener("DOMContentLoaded", function(){
      document.body.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-size:1.4rem;padding:2rem;text-align:center;">アクセスできません</div>';
    });
  }
})();
</script>
<title>頻出語句クイズ（No.1401-1552）</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="page">
  <section class="screen" id="menuScreen">
    <div class="card hero">
      <p class="eyebrow">Vocabulary Quiz</p>
      <h1>頻出語句クイズ（No.1401-1552）</h1>
      <p class="lead">B列通し番号1401–1552の範囲から出題します。</p>
      <div class="grid">
        <label><span>開始番号</span><input type="number" id="startInput" min="1401" max="1552" value="1401"></label>
        <label><span>終了番号</span><input type="number" id="endInput" min="1401" max="1552" value="1552"></label>
      </div>
      <div class="modeWrap">
        <span class="modeLabel">出題順</span>
        <div class="toggleRow">
          <button type="button" class="modeBtn active" data-mode="order">順番通り</button>
          <button type="button" class="modeBtn" data-mode="random">ランダム</button>
        </div>
      </div>
      <button class="primaryBtn" id="startBtn">スタート</button>
    </div>
  </section>

  <section class="screen hidden" id="quizScreen">
    <div class="card quizCard">
      <div class="topbar">
        <div id="progressText">1 / 152</div>
        <div id="scoreText">Score: 0</div>
      </div>
      <div class="wordRow">
        <h2 id="wordText">word</h2>
        <button class="iconBtn" id="speakBtn" type="button" aria-label="発音を再生">🔊</button>
      </div>
      <div id="choices" class="choices"></div>
      <div id="feedback" class="feedback hidden"></div>
      <div class="navRow">
        <button type="button" class="subBtn" id="prevBtn">前へ</button>
        <button type="button" class="subBtn" id="nextBtn">次へ</button>
      </div>
      <div class="menuRow">
        <button type="button" class="ghostBtn" id="restartBtn">同条件でリスタート</button>
        <button type="button" class="ghostBtn" id="retryRangeBtn">別範囲でやり直し</button>
        <button type="button" class="ghostBtn" id="backMenuBtn">メニューに戻る</button>
      </div>
    </div>
  </section>

  <section class="screen hidden" id="resultScreen">
    <div class="card hero">
      <p class="eyebrow">Finished</p>
      <h2>全問終了</h2>
      <p class="resultScore" id="finalScore">0 / 0</p>
      <div class="menuRow center">
        <button type="button" class="primaryBtn" id="restartFromResultBtn">同条件でリスタート</button>
        <button type="button" class="ghostBtn" id="retryRangeFromResultBtn">別範囲でやり直し</button>
        <button type="button" class="ghostBtn" id="backMenuFromResultBtn">メニューに戻る</button>
      </div>
    </div>
  </section>

  <footer class="footer">
    本教材は授業内利用を目的とした補助教材です。<br>
    市販教材を参考にしていますが、例文・表現は独自に作成しています。
  </footer>
</div>
<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
